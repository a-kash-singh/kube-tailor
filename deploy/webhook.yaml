# MutatingWebhookConfiguration for kube-tailor.
#
# BEFORE APPLYING:
#   Replace CA_BUNDLE_BASE64 with the base64-encoded CA certificate that signed
#   the webhook TLS cert (no newlines):
#
#     cat ca.crt | base64 | tr -d '\n'
#
# The certificate SAN must include:
#   kube-tailor.kube-tailor.svc
#   kube-tailor.kube-tailor.svc.cluster.local
#
# See README.md → TLS setup for certificate generation steps.

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kube-tailor
webhooks:
  - name: kube-tailor.kube-tailor.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # fail-open: pod creation is never blocked when the webhook is unavailable
    failurePolicy: Ignore
    clientConfig:
      service:
        name: kube-tailor
        namespace: kube-tailor
        path: /mutate-pods
      caBundle: CA_BUNDLE_BASE64
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    # Uncomment to restrict to specific namespaces:
    # namespaceSelector:
    #   matchLabels:
    #     kube-tailor/inject: "true"
    #
    # Exclude the webhook's own namespace to avoid circular dependency:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-tailor"]
