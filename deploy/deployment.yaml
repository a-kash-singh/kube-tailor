apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-tailor
  namespace: kube-tailor
  labels:
    app: kube-tailor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-tailor
  template:
    metadata:
      labels:
        app: kube-tailor
    spec:
      serviceAccountName: kube-tailor
      containers:
        - name: kube-tailor
          image: ghcr.io/a-kash-singh/kube-tailor:latest
          ports:
            - containerPort: 443
              name: https
          env:
            - name: TLS
              value: "true"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_JSON
              value: "true"
          volumeMounts:
            - name: tls
              mountPath: /etc/admission-webhook/tls
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: kube-tailor-tls
---
apiVersion: v1
kind: Service
metadata:
  name: kube-tailor
  namespace: kube-tailor
spec:
  selector:
    app: kube-tailor
  ports:
    - port: 443
      targetPort: 443
      name: https
